<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kôrô-Pass 🔐</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono&family=Inter&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#121212;
    --gold:#d4af37;
    --muted:#9aa0a6;
    --card:rgba(255,255,255,0.04);
}

body{
    background:var(--bg);
    color:white;
    font-family:Inter;
}

.title{
    font-family:Anton;
    color:var(--gold);
    letter-spacing:1px;
}

.card{
    background:var(--card);
    border:1px solid rgba(212,175,55,0.25);
    border-radius:18px;
    backdrop-filter: blur(8px);
}

.password{
    font-family:"JetBrains Mono";
    font-size:1.1rem;
}

.btn-gold{
    background:var(--gold);
    color:#000;
    font-weight:600;
}

.small-muted{
    font-size:0.85rem;
    color:var(--muted);
}

.bar{
    height:8px;
    border-radius:10px;
}
.history-item{
    cursor:pointer;
    opacity:.8;
}
.history-item:hover{
    opacity:1;
    color:var(--gold);
}
</style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card p-4">

<!-- HEADER -->
<h2 class="text-center title">Kôrô-Pass</h2>
<p class="text-center small-muted">Le vieux père veille sur tes accès</p>

<hr>

<!-- OUTPUT -->
<div class="input-group mb-2">
<input id="password" class="form-control password" type="password" readonly>
<button class="btn btn-outline-light" onclick="toggle()">👁️</button>
<button class="btn btn-gold" onclick="copy()">Copier</button>
</div>

<div id="feedback" class="text-center small-muted mb-2"></div>

<!-- MODE -->
<label class="small-muted">Mode</label>
<select id="mode" class="form-select mb-2">
<option value="standard">Mot de passe sécurisé</option>
<option value="momo">Code MoMo (6 chiffres)</option>
<option value="phrase">Passphrase Kôrô</option>
</select>

<!-- LENGTH -->
<label class="small-muted">Longueur</label>
<select id="length" class="form-select mb-3">
<option>8</option>
<option>10</option>
<option selected>12</option>
<option>14</option>
</select>

<!-- OPTIONS -->
<div class="mb-2"><input type="checkbox" id="lowercase" checked> minuscules</div>
<div class="mb-2"><input type="checkbox" id="uppercase" checked> majuscules</div>
<div class="mb-2"><input type="checkbox" id="numbers" checked> chiffres</div>
<div class="mb-2"><input type="checkbox" id="specials"> spéciaux</div>

<div class="mb-2"><input type="checkbox" id="noRepeat"> éviter répétitions</div>

<hr>

<button class="btn btn-gold w-100" onclick="generate()">🔥 Générer du solide</button>

<!-- STRENGTH -->
<div class="mt-3">
<div class="bar bg-secondary">
<div id="bar" class="bar bg-success" style="width:0%"></div>
</div>
<div id="strength" class="small-muted mt-2"></div>
</div>

<hr>

<!-- HISTORY -->
<h6>Mémoire du Kôrô</h6>
<div id="history" class="small-muted"></div>

</div>

</div>
</div>
</div>

<script>

/* ---------------- DATA ---------------- */

const words = [
"mango","lion","cacao","lagune","baobab",
"or","savane","nouchi","abidjan","river"
];

/* ---------------- UTIL ---------------- */

function rand(max){
    let a=new Uint32Array(1);
    crypto.getRandomValues(a);
    return a[0]%max;
}

/* ---------------- GENERATE ---------------- */

function generate(){

let mode = document.getElementById("mode").value;

if(mode==="momo"){
    let pin="";
    for(let i=0;i<6;i++) pin+=rand(10);
    return set(pin,10,"Code MoMo généré");
}

if(mode==="phrase"){
    let p=[];
    for(let i=0;i<4;i++) p.push(words[rand(words.length)]);
    p.push(rand(99));
    return set(p.join("-"),80,"Passphrase Kôrô");
}

/* STANDARD */
let sets=[];

if(lowercase.checked) sets.push("abcdefghijklmnopqrstuvwxyz");
if(uppercase.checked) sets.push("ABCDEFGHIJKLMNOPQRSTUVWXYZ");
if(numbers.checked) sets.push("0123456789");
if(specials.checked) sets.push("!@#$%^&*");

let all=sets.join("");
let len=+length.value;

let pwd=[];

sets.forEach(s=>pwd.push(s[rand(s.length)]));

while(pwd.length<len){
let c=all[rand(all.length)];
if(noRepeat.checked && pwd.includes(c)) continue;
pwd.push(c);
}

pwd=pwd.sort(()=>0.5-Math.random()).join("");

set(pwd, all.length, "Mot de passe sécurisé");

}

/* ---------------- ANALYSIS ---------------- */

function analyze(pwd,size){

let entropy = pwd.length*Math.log2(size);

let label="",score=0;

if(entropy<40){
label="Faible";
score=25;
}
else if(entropy<60){
label="Moyen";
score=50;
}
else if(entropy<80){
label="Fort";
score=75;
}
else{
label="KÔRÔ : INTOUCHABLE";
score=100;
}

return {entropy,label,score};
}

/* ---------------- SET UI ---------------- */

function set(pwd,size,msg){

password.value=pwd;

let a = analyze(pwd,size);

bar.style.width=a.score+"%";

strength.innerHTML=
`${msg} — ${a.label} (${Math.round(a.entropy)} bits)`;

save(pwd);

}

/* ---------------- COPY ---------------- */

function copy(){
navigator.clipboard.writeText(password.value);
feedback.innerText="C’est dans ta poche 👊";
setTimeout(()=>feedback.innerText="",2000);
}

/* ---------------- UI ---------------- */

function toggle(){
password.type=password.type==="password"?"text":"password";
}

/* ---------------- HISTORY ---------------- */

function save(p){
let h=JSON.parse(localStorage.getItem("koro")||"[]");
h.unshift(p);
h=h.slice(0,5);
localStorage.setItem("koro",JSON.stringify(h));
render();
}

function render(){
let h=JSON.parse(localStorage.getItem("koro")||"[]");
history.innerHTML=h.map(x=>`<div class="history-item">${x}</div>`).join("");
}

render();

</script>

</body>
</html>
